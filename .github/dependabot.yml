version: 2

# Dependabot keeps SHA-pinned actions, npm deps, and Docker base images
# current with annotated PRs. Without this, the security pins in
# publish.yml / ci.yml would silently rot to known-vulnerable versions.
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      dev-deps:
        dependency-type: development

  - package-ecosystem: docker
    directory: /server
    schedule:
      interval: weekly
