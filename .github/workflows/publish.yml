name: publish

# Fires when commits land on main (including via the stamp server's
# post-receive mirror). Publishes to npm only when package.json declares
# a version that isn't already on the registry — every non-bump merge
# no-ops safely.
#
# Auth: Trusted Publishing via OIDC. No NPM_TOKEN secret; the npm package
# must have a Trusted Publisher configured on the npm side pointing at
# this repo + workflow filename (npm package → Settings → Trusted
# Publishers). --provenance attaches an SLSA build attestation to the
# published tarball, verifiable via 'npm audit signatures'.

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write
      id-token: write

    steps:
      # Actions are pinned by full commit SHA (not mutable tag) because this
      # workflow holds id-token: write for npm Trusted Publishing — a moved
      # @v4 tag would let an upstream compromise ship malicious stamp-cli to
      # every downstream installer. Dependabot's github-actions ecosystem
      # keeps these SHAs current with annotated PRs.
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"


      # The package.json `version` and `name` are *file content*, not
      # GitHub-managed metadata. Both reach this workflow as whatever
      # bytes the maintainer (or a reviewer-approved PR) committed. The
      # file content is gated by stamp's reviewer flow upstream, but the
      # CI side must still treat them as untrusted strings: bash and
      # ${{ … }} interpolation will both happily expand a `"; …; "` shape
      # into shell that this workflow runs with `id-token: write` (npm
      # OIDC publish) and `contents: write` (git push) — i.e. enough to
      # ship a malicious release of @openthink/stamp and tag it.
      #
      # Two defenses, both shipping here:
      #   1. The values are written to GITHUB_OUTPUT via heredoc rather
      #      than `echo "k=$V"`, so a newline-bearing version cannot
      #      inject extra output keys (output-injection shape).
      #   2. Downstream steps consume those outputs via `env:` rather
      #      than ${{ … }} substituted into bash, so a `"`/`;`/`$`
      #      embedded in the value is shell-quoted by Actions and
      #      handed to bash as a literal env-var value.
      - name: read target version
        id: version
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          # Derive the npm dist-tag from the version string.
          # - bare X.Y.Z → latest
          # - X.Y.Z-alpha.N → alpha (and likewise beta, rc, or any other suffix
          #   label) so prerelease versions do NOT clobber the 'latest' tag
          if [[ "$VERSION" == *-* ]]; then
            DIST_TAG="${VERSION#*-}"
            DIST_TAG="${DIST_TAG%%.*}"
          else
            DIST_TAG="latest"
          fi
          # Heredoc form so a newline in any value can't terminate the
          # output-key parser early and inject additional keys. The
          # delimiter is per-key + has a UUID-shaped suffix to bound
          # against the (vanishingly unlikely) case where the value
          # legitimately contains the delimiter.
          {
            echo "name<<__EOF_NAME_$$"
            echo "$NAME"
            echo "__EOF_NAME_$$"
            echo "version<<__EOF_VERSION_$$"
            echo "$VERSION"
            echo "__EOF_VERSION_$$"
            echo "dist_tag<<__EOF_DIST_TAG_$$"
            echo "$DIST_TAG"
            echo "__EOF_DIST_TAG_$$"
          } >> "$GITHUB_OUTPUT"
          echo "target: $NAME@$VERSION (dist-tag: $DIST_TAG)"

      - name: check npm registry
        id: check
        env:
          # Treat package.json values as untrusted; never substitute
          # ${{ steps.* }} directly into a bash run: block. v4 audit M-SC1.
          NAME: ${{ steps.version.outputs.name }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "$NAME@$VERSION already on npm — skipping."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "$NAME@$VERSION not on npm — will publish."
          fi

      - name: install
        if: steps.check.outputs.published == 'false'
        run: npm ci

      - name: typecheck
        if: steps.check.outputs.published == 'false'
        run: npm run typecheck

      # Build is invoked automatically via package.json's prepublishOnly
      # script before the tarball is assembled, so no explicit build step.
      # --provenance requires id-token: write and a Trusted Publisher on
      # the npm side; attaches an SLSA build attestation to the tarball.
      #
      # npx npm@<pinned> (not bare 'npm publish'): Node 22 bundles npm 10.x,
      # which supports OIDC only for provenance signing but NOT for
      # authenticating the registry PUT — that requires npm 11.5.1+.
      # Self-upgrading via 'npm install -g npm@latest' breaks on hosted
      # runners (MODULE_NOT_FOUND on promise-retry as the running npm
      # replaces its own modules mid-flight). npx fetches a clean npm
      # per-run without touching the globally-installed npm.
      #
      # Pinned to a specific version (not @latest) because this step holds
      # id-token: write — npm@latest would auto-adopt any new npm release
      # the moment it ships, including a compromised one. Bump explicitly
      # when a newer npm is needed; lower bound is 11.5.1 for OIDC publish.
      - name: publish
        if: steps.check.outputs.published == 'false'
        env:
          DIST_TAG: ${{ steps.version.outputs.dist_tag }}
        run: npx -y npm@11.13.0 publish --access public --provenance --tag "$DIST_TAG"

      - name: tag release
        if: steps.check.outputs.published == 'false'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAG="v$VERSION"
          git tag "$TAG"
          git push origin "$TAG"
