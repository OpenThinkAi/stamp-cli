name: ci

# Runs on every push to main and every pull request opened against main.
# Build + typecheck are the same two checks the stamp merge gate enforces
# locally; running them in CI gives outside contributors (who don't have
# the stamp signing key) a clear green/red signal on their PR.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    # Explicit minimum scope for GITHUB_TOKEN: this job only needs to read
    # the source. Org-level defaults can still grant write; setting this at
    # the job level removes any doubt across org-policy changes.
    permissions:
      contents: read

    steps:
      # SHA-pinned for the same reasons as publish.yml (see comment there).
      # Smaller blast radius here (read-only token, fork PRs run in fork
      # context), but consistency with publish.yml means a future change
      # that adds secrets won't silently inherit a mutable-tag foot-gun.
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: setup node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: "npm"

      - name: install
        run: npm ci

      - name: build
        run: npm run build

      - name: typecheck
        run: npm run typecheck
