branches:
  main:
    required:
      - security
      - standards
      - product
    required_checks:
      - name: build
        run: npm run build
      - name: typecheck
        run: npm run typecheck
      - name: test
        run: npm test
      - name: docker-boot-smoke
        run: bash scripts/docker-boot-smoke.sh
reviewers:
  security:
    prompt: .stamp/reviewers/security.md
  standards:
    prompt: .stamp/reviewers/standards.md
  product:
    prompt: .stamp/reviewers/product.md
